<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Turbo Wedge — воронка 3–13 июля</title>
    <meta name="description" content="Матрица воронки Turbo Wedge за 3–13 июля 2026 года." />
  </head>
  <body>
    <main class="page">
      <header>
        <h1>Воронка Turbo Wedge</h1>
        <p>Дневные срезы за 3–13 июля 2026</p>
      </header>
      <section aria-labelledby="base-title">
        <h2 id="base-title">Матрица значений</h2>
        <div class="table-frame"><div id="base-matrix"></div></div>
      </section>
      <section aria-labelledby="heatmap-title">
        <div class="section-heading">
          <div><h2 id="heatmap-title">Матрица проседаний</h2><p>Каждый день нормирован отдельно: максимум — зелёный, ноль — красный.</p></div>
          <div class="legend" aria-label="Шкала значений"><span>Макс.</span><i></i><span>0</span></div>
        </div>
        <div class="table-frame"><div id="heat-matrix"></div></div>
      </section>
      <section aria-labelledby="delta-title">
        <h2 id="delta-title">Матрица с потерями между шагами</h2>
        <div class="table-frame"><div id="delta-matrix"></div></div>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
